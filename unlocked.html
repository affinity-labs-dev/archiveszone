  <style>
    :root{--snow:#FAFAFA;--onyx:#1A1A1A;--blue:#1E3C88;--blue-2:#A2C5FF;--gold:#FFD965;--green:#5B860C;--green-1:#284200;
      --r-btn:26.5px;--r-card:20px;--ui:'Onest',system-ui,-apple-system,sans-serif;--display:'Bounded','Onest',sans-serif;}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:var(--ui);background:var(--snow);color:var(--onyx);-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{max-width:440px;width:100%;text-align:center}
    .check{width:76px;height:76px;border-radius:50%;border:2px solid var(--onyx);background:var(--green-1);box-shadow:0 4px 0 var(--green);display:inline-flex;align-items:center;justify-content:center;margin-bottom:18px}
    .check svg{width:38px;height:38px;color:#fff}
    h1{font-family:var(--display);font-weight:900;font-size:clamp(30px,9vw,42px);line-height:1.04;letter-spacing:-.5px}
    .lead{font-size:16px;color:#4a4a4a;margin:12px 0 22px;font-weight:500}
    .btn{display:block;width:100%;font-weight:800;font-size:18px;padding:16px 22px;border:2px solid var(--onyx);border-radius:var(--r-btn);
      cursor:pointer;text-decoration:none;background:var(--gold);color:var(--onyx);box-shadow:0 4px 0 #c9a93a;transition:transform .08s,box-shadow .08s}
    .btn:active{transform:translateY(4px);box-shadow:0 0 0 #c9a93a}
    .step-note{font-size:13px;color:#8a8a8a;margin-top:12px}
    .qr{margin:20px auto 6px;width:160px;height:160px;border:2px solid var(--onyx);border-radius:16px;padding:8px;background:#fff;display:none}
    .qr.show{display:block}.qr img{width:100%;height:100%;display:block}
    .qr-note{font-size:13px;color:#8a8a8a;display:none}.qr-note.show{display:block}
    .divider{display:flex;align-items:center;gap:10px;color:#9a9a9a;font-size:12px;font-weight:700;margin:22px 0 14px;text-transform:uppercase;letter-spacing:.5px}
    .divider::before,.divider::after{content:'';flex:1;height:2px;background:#e3e3e3}
    .badges{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
    .badges img{height:48px;width:auto;display:block}
    .footer{margin-top:28px;font-size:12px;color:#9a9a9a}
  </style>
</head>
<body>
  <div class="card">
    <div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
    <h1>You're in.</h1>
    <p class="lead">Your Archives plan is active. One tap opens everything on your phone, with your plan ready to start.</p>

    <a href="#" id="openBtn" class="btn">Open Archives</a>
    <p class="step-note" id="stepNote">If it does not open, scan the code below on your phone.</p>

    <div class="qr" id="qr"><img id="qrImg" alt="Scan to open Archives on your phone" /></div>
    <p class="qr-note" id="qrNote">Scan with your phone camera to unlock Archives.</p>

    <div class="divider">or get the app</div>
    <div class="badges">
      <a href="https://apps.apple.com/us/app/archives-islamic-history/id6751173663" target="_blank" rel="noopener"><img src="/images/onboarding/badge-appstore.svg" alt="Download on the App Store" /></a>
      <a href="https://play.google.com/store/apps/details?id=ai.affinitylabs.archivesexpo" target="_blank" rel="noopener"><img src="/images/onboarding/badge-googleplay.png" alt="Get it on Google Play" /></a>
    </div>

    <div class="footer">Archives by Affinity Labs Ltd</div>
  </div>

<script>
(function(){
  'use strict';
  var params=new URLSearchParams(location.search);
  var redeem=params.get('redeem');
  var STORE_IOS='https://apps.apple.com/us/app/archives-islamic-history/id6751173663';
  var STORE_AND='https://play.google.com/store/apps/details?id=ai.affinitylabs.archivesexpo';
  var ua=navigator.userAgent||'';
  var isIOS=/iPad|iPhone|iPod/.test(ua)||(ua.indexOf('Macintosh')>-1&&'ontouchend' in document);
  var isAndroid=/Android/.test(ua);
  // Primary: the RevenueCat-issued redemption URL (?redeem). Fallback: the app's
  // RevenueCat redemption scheme rc-<appId> so an installed app can still be opened.
  var DEEP_LINK=redeem||'rc-4b595ca928://';

  /* purchase conversion (RC redirects here on success). Server-side RC webhooks
     remain the source of truth for redeemed_in_app / trial_to_paid; firing here
     closes the web funnel. */
  var isSuccess=params.get('status')==='success'||params.get('purchase')==='1'||!!redeem;
  if(isSuccess){
    var plan=params.get('plan')||'unknown';
    try{if(typeof gtag==='function')gtag('event','purchase',{transaction_id:params.get('tx')||undefined,currency:'USD',items:[{item_id:plan,item_name:'Archives '+plan}]});}catch(e){}
    try{if(typeof fbq==='function'){fbq('track','StartTrial');fbq('track','Subscribe');}}catch(e){}
    try{if(typeof ttq!=='undefined'){ttq.track('Subscribe',{content_name:plan});}}catch(e){}
    try{if(typeof posthog!=='undefined'&&posthog.capture)posthog.capture('purchase',{plan:plan});}catch(e){}
  }

  /* QR for the redemption link (handy when paying on desktop) */
  if(redeem&&!isIOS&&!isAndroid){
    var qr=document.getElementById('qr'),img=document.getElementById('qrImg');
    img.onload=function(){qr.classList.add('show');document.getElementById('qrNote').classList.add('show');};
    img.src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=0&data='+encodeURIComponent(redeem);
  }

  function openApp(){
    if(isIOS||isAndroid){ location.href=DEEP_LINK; }
    else if(redeem){ location.href=DEEP_LINK; }
    else { window.open(isAndroid?STORE_AND:STORE_IOS,'_blank','noopener'); }
  }
  document.getElementById('openBtn').addEventListener('click',function(e){
    e.preventDefault();
    try{if(typeof gtag==='function')gtag('event','app_open_click',{link_location:'unlocked_page'});}catch(_){}
    try{if(typeof fbq==='function')fbq('trackCustom','AppOpenClick',{location:'unlocked_page'});}catch(_){}
    openApp();
  });

  document.querySelectorAll('a[href*="apps.apple.com"],a[href*="play.google.com"]').forEach(function(a){
    a.addEventListener('click',function(){
      var store=a.href.indexOf('apps.apple.com')>-1?'ios':'android';
      try{if(typeof gtag==='function')gtag('event','store_click',{store:store,link_location:'unlocked_page'});}catch(_){}
      try{if(typeof fbq==='function')fbq('trackCustom','StoreClick',{store:store});}catch(_){}
      try{if(typeof ttq!=='undefined')ttq.track('Download',{content_name:store==='ios'?'App Store':'Google Play'});}catch(_){}
    });
  });

  if(isIOS||isAndroid){ setTimeout(openApp,600); }
  else { document.getElementById('stepNote').textContent=redeem?'Scan the code below on your phone to unlock Archives.':'Get Archives on your phone below.'; }
})();
</script>
</body>
</html>
