  <style>
    /* ===== Archives design system tokens (Figma: Archives_Raw_File / Design system) ===== */
    :root{
      --snow:#FAFAFA; --onyx:#1A1A1A; --white:#FFFFFF;
      --blue:#1E3C88; --blue-2:#A2C5FF;
      --acai-1:#5E2368; --acai:#8C60CD; --acai-3:#E5D4FF;
      --gold:#FFD965; --pink:#6B1A3D; --pink-2:#C61E79; --grey:#C3C3C3;
      --green:#5B860C; --green-1:#284200; --green-3:#BDFF6B;
      --red:#8B0808; --red-3:#FF8888;
      --r-btn:26.5px; --r-card:20px;
      --display:'Bounded','Onest',system-ui,sans-serif;
      --ui:'Onest',system-ui,-apple-system,sans-serif;
      --page-px:20px; --shadow-y:4px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{
      font-family:var(--ui); color:var(--onyx); background:var(--snow);
      -webkit-font-smoothing:antialiased; overflow-x:hidden;
    }
    /* ===== Type scale ===== */
    .t-hero{font-family:var(--display);font-weight:900;font-size:clamp(30px,8.5vw,50px);line-height:1.06;letter-spacing:-.5px}
    .t-display{font-family:var(--display);font-weight:900;font-size:clamp(22px,6vw,28px);line-height:1.2}
    .t-hxl{font-weight:900;font-size:clamp(24px,6.5vw,30px);line-height:1.12;letter-spacing:-.5px}
    .t-hm{font-weight:700;font-size:22px;line-height:1.15}
    .t-bl{font-weight:600;font-size:18px;line-height:1.35}
    .t-bm{font-weight:600;font-size:16px;line-height:1.4}
    .t-bs{font-weight:500;font-size:14px;line-height:1.45;color:#4a4a4a}
    .muted{color:#5b5b5b}

    /* ===== App shell ===== */
    #app{max-width:480px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}
    .topbar{flex:0 0 auto;z-index:20;display:flex;align-items:center;gap:12px;
      padding:10px var(--page-px) 10px;background:var(--snow)}
    .topbar .back{width:34px;height:34px;border:2px solid var(--onyx);border-radius:50%;background:var(--white);
      display:none;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto;font-size:18px;font-weight:700}
    .topbar .back.show{display:flex}
    /* wordmark header on its own row, above the progress bar row */
    .brandbar{flex:0 0 auto;display:flex;justify-content:center;padding:14px var(--page-px) 0;background:var(--snow)}
    .brandbar img{height:28px;width:auto;display:block}
    .progress{flex:1;height:10px;background:#ececec;border:2px solid var(--onyx);border-radius:20px;overflow:hidden}
    .progress > i{display:block;height:100%;width:0;background:var(--blue);transition:width .45s cubic-bezier(.22,1,.36,1)}
    .restart{font-size:12px;font-weight:700;color:#7a7a7a;text-decoration:underline;cursor:pointer;background:none;border:0;flex:0 0 auto;padding:9px 4px;min-height:24px}

    .stage{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;padding:8px var(--page-px) 24px;position:relative}
    .skiplink{position:absolute;left:-9999px;top:0;z-index:60;background:var(--onyx);color:#fff;padding:10px 16px;border-radius:0 0 12px 0;font-weight:700}
    .skiplink:focus{left:0}

    /* ===== Screen machine ===== */
    .screen{display:none;flex:1;flex-direction:column;animation:none}
    .screen.active{display:flex;animation:slideUp .42s cubic-bezier(.22,1,.36,1) both}
    @keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    .screen .head{margin:10px 0 22px}
    .screen .head .kicker{display:inline-block;font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--blue);margin-bottom:10px}
    .screen .body{flex:1}

    /* ===== Buttons (hard-shadow pill) ===== */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
      font-family:var(--ui);font-weight:700;font-size:18px;line-height:1;
      padding:15px 22px;border:2px solid var(--onyx);border-radius:var(--r-btn);
      cursor:pointer;background:var(--white);color:var(--onyx);
      box-shadow:0 var(--shadow-y) 0 var(--onyx);transition:transform .08s ease,box-shadow .08s ease;
      -webkit-user-select:none;user-select:none}
    .btn:active{transform:translateY(var(--shadow-y));box-shadow:0 0 0 var(--onyx)}
    .btn[disabled]{opacity:.45;pointer-events:none}
    .btn-primary{background:var(--onyx);color:#fff;box-shadow:0 var(--shadow-y) 0 #00000033}
    .btn-tertiary{background:var(--blue);color:#fff;box-shadow:0 var(--shadow-y) 0 var(--blue-2)}
    .btn-secondary{background:var(--acai-3);color:var(--onyx);box-shadow:0 var(--shadow-y) 0 var(--acai-1)}
    .btn-gold{background:var(--gold);color:var(--onyx);box-shadow:0 var(--shadow-y) 0 #c9a93a}

    /* sticky footer CTA */
    .cta-dock{flex:0 0 auto;z-index:25;background:var(--snow);box-shadow:0 -1px 0 #0000001a;
      padding:14px var(--page-px) calc(14px + env(safe-area-inset-bottom))}

    /* On wider screens (tablet/desktop) let the whole document scroll instead of
       trapping scroll inside .stage — that nested scroll showed an ugly floating
       scrollbar mid-window. The progress bar and CTA dock stay put via sticky, so
       the app-like feel is preserved while the normal window scrollbar is used.
       Mobile keeps the fixed 100dvh app shell (above). */
    @media (min-width:768px){
      html,body{height:auto}
      #app{height:auto;min-height:100dvh;overflow:visible}
      .topbar{position:sticky;top:0}
      .stage{overflow:visible;min-height:auto}
      .cta-dock{position:sticky;bottom:0}
    }

    /* ===== Option cards ===== */
    .opts{display:flex;flex-direction:column;gap:12px}
    .opt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;
      padding:16px 18px;border:2px solid var(--onyx);border-radius:18px;background:var(--white);
      box-shadow:0 var(--shadow-y) 0 var(--onyx);cursor:pointer;font-weight:600;font-size:16px;color:var(--onyx);
      transition:transform .08s ease,box-shadow .08s ease,background .15s ease}
    .opt:active{transform:translateY(var(--shadow-y));box-shadow:0 0 0 var(--onyx)}
    .opt.selected{background:var(--blue-2)}
    .opt .ico{width:34px;height:34px;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
    .opt .ico svg{width:26px;height:26px;stroke:var(--onyx);stroke-width:2;fill:none}
    .opt .check{margin-left:auto;width:24px;height:24px;border-radius:50%;border:2px solid var(--onyx);flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:#fff}
    .opt.selected .check{background:var(--blue);color:#fff}
    .opt.selected .check::after{content:'✓';font-size:13px;font-weight:800;color:#fff}

    /* image option cards (grid) */
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    /* compact skin cards: all four (plus headline) fit above the fold on a
       375px phone — the old full-height cards hid half the choices */
    .grid-compact .imgopt{height:112px;width:100%}
    .grid-compact .imgopt img{width:100%;height:100%;object-fit:cover}
    .grid-compact .imgopt .lab{padding:8px 10px 9px;font-size:13px}
    @keyframes nudge{0%,100%{transform:none}50%{transform:scale(1.035)}}
    .grid-compact .imgopt:first-child{animation:nudge 1.5s ease-in-out .6s 2}
    /* desktop has room: let the journey images breathe */
    @media(min-width:640px){
      .grid-compact .imgopt{height:220px}
      .grid-compact .imgopt .lab{padding:12px 12px 13px;font-size:15px}
    }
    /* mobile: cap the proof image so the count-up stats stay in view */
    @media(max-width:639px){.appshot{max-height:148px}}
    .imgopt{position:relative;border:2px solid var(--onyx);border-radius:18px;overflow:hidden;cursor:pointer;
      box-shadow:0 var(--shadow-y) 0 var(--onyx);aspect-ratio:3/4;transition:transform .08s ease,box-shadow .08s ease}
    .imgopt:active{transform:translateY(var(--shadow-y));box-shadow:0 0 0 var(--onyx)}
    .imgopt img{width:100%;height:100%;object-fit:cover;display:block}
    .imgopt .lab{position:absolute;left:0;right:0;bottom:0;padding:12px 12px 13px;color:#fff;font-weight:700;font-size:15px;
      background:linear-gradient(transparent,rgba(0,0,0,.78))}
    .imgopt.selected{outline:4px solid var(--blue)}
    .imgopt.selected .lab::before{content:'✓ ';color:var(--blue-2)}

    /* chips */
    .chips{display:flex;flex-wrap:wrap;gap:10px}
    .chip{display:inline-flex;align-items:center;gap:8px;padding:11px 15px;border:2px solid var(--onyx);border-radius:var(--r-btn);
      background:#fff;box-shadow:0 3px 0 var(--onyx);cursor:pointer;font-weight:600;font-size:15px;transition:transform .08s,box-shadow .08s,background .15s}
    .chip:active{transform:translateY(3px);box-shadow:0 0 0 var(--onyx)}
    .chip.selected{background:var(--blue-2)}
    .chip svg{width:18px;height:18px;stroke:var(--onyx);stroke-width:2;fill:none}

    /* slider */
    .slider-wrap{margin:30px 0}
    input[type=range]{-webkit-appearance:none;width:100%;height:12px;border:2px solid var(--onyx);border-radius:20px;background:#ececec}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:34px;height:34px;border-radius:50%;background:var(--blue);border:2px solid var(--onyx);cursor:pointer;box-shadow:0 3px 0 var(--blue-2)}
    .slider-ticks{display:flex;justify-content:space-between;margin-top:12px;font-size:12px;font-weight:600;color:#6a6a6a}
    .slider-val{text-align:center;margin-top:18px}

    /* segmented */
    .seg{display:flex;flex-direction:column;gap:10px}

    /* likert */
    .likert{display:flex;flex-direction:column;gap:18px}
    .likert .q{font-weight:600;font-size:16px;margin-bottom:10px}
    .lk-row{display:flex;gap:8px}
    .lk-row button{flex:1;padding:10px 4px;border:2px solid var(--onyx);border-radius:12px;background:#fff;font-weight:700;font-size:12px;cursor:pointer;box-shadow:0 3px 0 var(--onyx)}
    .lk-row button:active{transform:translateY(3px);box-shadow:0 0 0 var(--onyx)}
    .lk-row button.on{background:var(--blue);color:#fff;box-shadow:0 3px 0 var(--blue-2)}

    /* recap meter */
    .meter{margin:24px auto;width:200px;height:200px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      background:conic-gradient(var(--blue) var(--p,30%),#e7e7e7 0);position:relative}
    .meter::after{content:'';position:absolute;inset:16px;border-radius:50%;background:var(--snow);border:2px solid var(--onyx)}
    .meter .num{position:relative;z-index:1;font-family:var(--display);font-weight:900;font-size:46px}
    /* recap power-up: gentle pulse while the score climbs, content reveals after */
    @keyframes charge{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
    .meter.charging{animation:charge 1s ease-in-out infinite}
    .reveal{opacity:0;transform:translateY(10px);transition:opacity .5s ease,transform .5s ease}
    .reveal.in{opacity:1;transform:none}
    .profile-card{border:2px solid var(--onyx);border-radius:var(--r-card);background:var(--acai-3);box-shadow:0 4px 0 var(--acai-1);padding:18px;margin-top:6px;text-align:center}

    /* diagnosis bars */
    .bars{display:flex;flex-direction:column;gap:16px;margin-top:8px}
    .bar .bar-top{display:flex;justify-content:space-between;font-weight:700;font-size:15px;margin-bottom:7px}
    .bar .track{height:16px;border:2px solid var(--onyx);border-radius:20px;background:#fff;overflow:hidden}
    .bar .track > i{display:block;height:100%;width:0;border-radius:20px;transition:width .9s cubic-bezier(.22,1,.36,1)}
    .deepdive{margin-top:22px;border:2px solid var(--onyx);border-radius:var(--r-card);background:#fff;box-shadow:0 4px 0 var(--pink);padding:18px}
    .deepdive .tag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#fff;background:var(--pink);border-radius:12px;padding:4px 10px;margin-bottom:10px}

    /* review card + badges */
    .review{border:2px solid var(--onyx);border-radius:var(--r-card);background:var(--blue-2);box-shadow:0 4px 0 var(--blue);padding:16px;margin:8px 0}
    .review .who{display:flex;justify-content:space-between;align-items:center;font-weight:800;margin-bottom:6px}
    .review .stars{color:var(--gold);-webkit-text-stroke:1px var(--onyx);letter-spacing:1px}
    .badges{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:18px}
    .badge{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border:2px solid var(--onyx);border-radius:var(--r-btn);background:#fff;font-weight:700;font-size:13px;box-shadow:0 3px 0 var(--blue-2)}
    .badge svg,.reassure svg{width:16px;height:16px;stroke:var(--onyx);stroke-width:2;fill:none;flex:0 0 auto}

    /* stat counters */
    .stats3{display:flex;gap:12px;text-align:center;margin:10px 0}
    .stats3 > div{flex:1;border:2px solid var(--onyx);border-radius:16px;background:#fff;box-shadow:0 4px 0 var(--gold);padding:16px 8px}
    .stats3 .n{font-family:var(--display);font-weight:900;font-size:26px;color:var(--blue)}
    .stats3 .l{font-size:12px;font-weight:600;color:#555;margin-top:4px}

    /* compare */
    .compare{display:flex;flex-direction:column;gap:14px;margin-top:8px}
    .compare .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .compare .col{border:2px solid var(--onyx);border-radius:16px;padding:16px;font-weight:600;font-size:14px}
    .compare .bad{background:#f3f0f0}
    .compare .good{background:var(--green-3);box-shadow:0 4px 0 var(--green)}

    /* email */
    .field{display:block;width:100%;padding:16px 18px;border:2px solid var(--onyx);border-radius:16px;font-family:var(--ui);font-size:16px;font-weight:600;background:#fff;margin-bottom:12px}
    .field:focus{outline:none;box-shadow:0 0 0 4px var(--blue-2)}
    .skip{display:block;text-align:center;margin-top:16px;font-weight:700;color:#7a7a7a;text-decoration:underline;background:none;border:0;width:100%;cursor:pointer}
    .reassure{display:flex;align-items:center;gap:8px;justify-content:center;font-size:12px;color:#6a6a6a;margin-top:14px}

    /* loader */
    .load-row{margin:16px 0}
    .load-row .lab{display:flex;justify-content:space-between;font-weight:600;font-size:14px;margin-bottom:6px}
    .load-row .track{height:12px;border:2px solid var(--onyx);border-radius:20px;background:#fff;overflow:hidden}
    .load-row .track > i{display:block;height:100%;width:0;background:var(--green);transition:width .8s linear}

    /* ===== App-styled preview (rebuilds the real app cards) ===== */
    .phone{border:3px solid var(--onyx);border-radius:30px;background:#fff;overflow:hidden;box-shadow:0 6px 0 var(--blue);margin:6px 0 4px}
    .phone .ph-top{background:var(--blue);color:#fff;padding:14px 16px}
    .phone .ph-top .ttl{font-weight:800;font-size:16px}
    .streak{display:flex;justify-content:space-between;margin-top:12px}
    .streak .d{width:30px;height:30px;border-radius:50%;background:#ffffff22;border:1.5px solid #ffffff55;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
    .streak .d.on{background:var(--gold);color:var(--onyx);border-color:var(--onyx)}
    .ph-body{padding:14px}
    .story-card{position:relative;border:2px solid var(--onyx);border-radius:16px;overflow:hidden;aspect-ratio:16/10;margin-bottom:12px}
    .story-card img{width:100%;height:100%;object-fit:cover}
    .story-card .ov{position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,.8));display:flex;flex-direction:column;justify-content:flex-end;padding:14px;color:#fff}
    .story-card .play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;border-radius:50%;background:#ffffffdd;border:2px solid var(--onyx);display:flex;align-items:center;justify-content:center;font-size:18px}
    /* quiz */
    .quiz-q{font-weight:700;font-size:17px;margin:6px 2px 14px;text-align:center}
    .quiz-opt{display:flex;align-items:center;gap:12px;padding:13px 16px;border:2px solid var(--onyx);border-radius:14px;background:#fff;margin-bottom:10px;font-weight:600;cursor:pointer;box-shadow:0 3px 0 var(--onyx)}
    .quiz-opt:active{transform:translateY(3px);box-shadow:0 0 0 var(--onyx)}
    .quiz-opt .lt{width:26px;height:26px;border-radius:50%;border:2px solid var(--onyx);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex:0 0 auto}
    .quiz-opt.correct{background:var(--green-3);box-shadow:0 3px 0 var(--green)}
    .quiz-opt.correct .lt{background:var(--green);color:#fff;border-color:var(--green-1)}
    .quiz-opt.wrong{background:var(--red-3)}
    .feedback{text-align:center;font-weight:800;margin:8px 0 2px;min-height:24px}

    .plan-list{display:flex;flex-direction:column;gap:10px;margin:14px 0}
    .plan-item{display:flex;gap:12px;align-items:center;border:2px solid var(--onyx);border-radius:14px;background:#fff;padding:12px;box-shadow:0 3px 0 var(--blue-2)}
    .plan-item .day{width:42px;height:42px;border-radius:12px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;text-align:center;line-height:1.05;flex:0 0 auto}

    /* soft-exit modal */
    .modal-bg{position:fixed;inset:0;background:#000a;z-index:40;display:none;align-items:center;justify-content:center;padding:20px}
    .modal-bg.show{display:flex}
    .modal{background:var(--snow);border:2px solid var(--onyx);border-radius:var(--r-card);box-shadow:0 6px 0 var(--pink);padding:24px;max-width:380px;width:100%;text-align:center}

    .center{text-align:center}
    .mt8{margin-top:8px}.mt16{margin-top:16px}.mt24{margin-top:24px}
    .hero-img{width:100%;border-radius:var(--r-card);border:2px solid var(--onyx);box-shadow:0 4px 0 var(--blue);margin:6px 0 18px;aspect-ratio:16/10;object-fit:cover}

<script>

(function(){

  var STEPS=[
    {type:'hook_quiz',key:'hook',phase:'hook'},

    {type:'recap',phase:'discover'},

    {type:'results',phase:'reveal'}

  /* ---------- diagnosis model ---------- */
  // categories: knowledge, time, access, identity
  function computeDiagnosis(s){
    var c={knowledge:18,time:14,access:16,identity:16};
    var b=s.blocker;
    if(b==='school'){c.knowledge+=34;c.identity+=10}
    else if(b==='start'){c.knowledge+=26;c.access+=12}

    else if(b==='time'){c.time+=36;c.identity+=6}

    if(lk.tell>=3)c.knowledge+=10; if(lk.identity>=3)c.identity+=16;

    if(lk.empty>=3)c.identity+=6;
    var conn=(s.connection==null?40:s.connection);
    if(conn<40){c.knowledge+=8;c.identity+=8}
    // normalize each to 0-100 with a cap
    var max=Math.max(c.knowledge,c.time,c.access,c.identity,1);
    var scale=Math.min(92,Math.max(60,max))/max; // keep top bar in a believable 60-92 band
    var out={};Object.keys(c).forEach(function(k){out[k]=Math.round(Math.min(95,c[k]*scale))});

  }
  var CAT_META={

  };
  var DEEPDIVE={
    knowledge:{t:'Your biggest gap: the stories themselves',b:'This isn\'t a discipline problem. No one ever handed you these stories. School skipped a thousand years of history. Archives gives them to you in 5-minute pieces, in the right order, so it finally connects.'},
    time:{t:'Your biggest gap: a way to stay consistent',b:'You don\'t lack interest. You lack a format that survives a busy day. One 5-minute story a day, with a streak that gently pulls you back, does what a 400-page book never will.'},

    identity:{t:'Your biggest gap: a felt connection to your story',b:'That gap between who you are and where you come from is real, and it closes faster than you\'d think. When the people in these stories stop being names and start being yours, something shifts.'}
  };

  /* ---------- analytics ---------- */

  var TT_CAPI=SUPABASE_URL+'/functions/v1/tiktok-events';

  /* ---------- sha256 (advanced matching) ---------- */
  function sha256(str){if(!window.crypto||!crypto.subtle)return Promise.resolve(null);
    return crypto.subtle.digest('SHA-256',new TextEncoder().encode((str||'').trim().toLowerCase())).then(function(b){
      return Array.prototype.map.call(new Uint8Array(b),function(x){return('0'+x.toString(16)).slice(-2)}).join('')});}
